name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # This tells the Action to perform all commands inside this subfolder
        working-directory: ./frontend-handbook
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./frontend-handbook/package-lock.json

      - run: npm ci
      
      - run: npm run build
        env:
          # This forces the build to use the subpath without breaking local dev
          BASE_URL: /Frontend-Engineering-Handbook/
      
      - name: Create .nojekyll
        run: touch build/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          # We point to the build folder inside the subfolder
          path: './frontend-handbook/build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4